# Render Blueprint — ResumeMatch API (FastAPI + Docker)
# Frontend: deploy on Vercel (root dir: frontend)
#
# Required env vars (Render dashboard):
#   GROQ_API_KEY   — AI chat + rewrite
#   CORS_ORIGINS   — e.g. https://your-app.vercel.app
#
# Render FREE tier (512MB): set SKIP_LAYER2=1 to avoid OOM from torch/embeddings.
# Render STARTER ($7): leave SKIP_LAYER2 unset for full Layer 2 skill matching.

services:
  - type: web
    name: resumematch-api
    runtime: docker
    dockerfilePath: ./resume_scorer/Dockerfile.api
    dockerContext: ./resume_scorer
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SKIP_LAYER2
        value: "1"
